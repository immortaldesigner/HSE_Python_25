version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: url_shortener_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shortener
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: url_shortener_redis
    restart: always
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: url_shortener_api
    restart: always
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/shortener
      SECRET_KEY: supersecretkey
      ALGORITHM: HS256
      REDIS_URL: redis://redis:6379/0
      UNUSED_LINK_DAYS: 0

volumes:
  postgres_data: